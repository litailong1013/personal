<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarryCodeサイト | Litailong Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../../assets/images/logo/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../assets/css/site.css" />


  </head>
  <body data-page="web-detail" data-root-path="../..">
    <div data-site-shell>
      <main class="page-shell page-generic">
        <section class="web-detail" data-web-detail>
          <!-- 分类：Web / KAGOME -->
          <a class="web-detail__back" href="../web.html" aria-label="返回 Web 列表">
            <span class="web-detail__back-icon" aria-hidden="true"></span>
          </a>
          <div class="web-detail__top">
            <div class="web-detail__gallery">
              <!-- 顶部 banner 图片区域 -->
              <div class="web-detail__carousel" data-detail-carousel>
                <div class="web-detail__track">
                  <article class="web-detail__hero"><img src="../../assets/images/works/project/platform-purchase/1.png" alt="" /></article>                
                </div>
              </div>
              <div class="web-detail__gallery-controls">
                <button class="web-detail__gallery-nav web-detail__gallery-nav--prev" type="button" aria-label="上一张">‹</button>
                <div class="web-detail__gallery-dots" data-detail-dots></div>
                <button class="web-detail__gallery-nav web-detail__gallery-nav--next" type="button" aria-label="下一张">›</button>
              </div>
              <section class="web-detail__screens" data-device-switcher>
                <div class="web-detail__device-tabs">
                  <button class="web-detail__device-tab is-active" type="button" data-device-tab="pc">PC</button>
                </div>
                <div class="web-detail__event-tabs" data-event-tabs aria-label="Events"></div>
                <div class="web-detail__device-panels">
                  <!-- PC 图片区域 -->
                  <div class="web-detail__device-panel is-active" data-device-panel="pc">
                    <div class="web-detail__event-panel is-active" data-event-panel="Home">
                      <div class="web-detail__desktop-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/platform-purchase/subpage-01-pc.png" alt="" /></div></div></div>
                    </div>
                    <div class="web-detail__event-panel" data-event-panel="決済画面">
                      <div class="web-detail__desktop-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/platform-purchase/subpage-02-pc.png" alt="" /></div></div></div>
                    </div>
                    <div class="web-detail__event-panel" data-event-panel="オーダー画面">
                      <div class="web-detail__desktop-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/platform-purchase/subpage-03-pc.png" alt="" /></div></div></div>
                    </div>
                 
                  </div>
                </div>
              </section>
            </div>
            <aside class="web-detail__info">
              <h1>越境EC仕入れプラットフォーム</h1>
              <div class="web-detail__copy">
                <p>越境EC仕入れプラットフォームの制作事例。<br>
                本プロジェクトでは、プロダクト設計およびUI/UXデザインを担当しました。<br>
                商品検索、比較、仕入れ判断、発注までの一連の流れを整理し、複雑になりやすい越境取引の情報をわかりやすく可視化。
                デザイン面では、業務効率と視認性を重視し、価格・商品情報・取引条件などをスムーズに把握できる体験設計を目指しました。
            </p>
              </div>
              <div class="web-item__tools">
                <p>Tool</p>
                <div class="web-item__icons">
                  <img src="../../assets/images/toolicon/mark_photoshop.png" alt="Photoshop" />
                  <img src="../../assets/images/toolicon/mark_illustrator.png" alt="Illustrator" />
                  <img src="../../assets/images/toolicon/mark_figma.png" alt="Figma" />
                </div>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="../../assets/js/site-app.js"></script>
