<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RED（小紅書） | Litailong Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../../assets/images/logo/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../assets/css/site.css" />
    <style>
    .web-detail__carousel,
    .web-detail__gallery-controls {
    display: none;
    }
    </style>
  </head>
  <body data-page="web-detail" data-root-path="../..">
    <div data-site-shell>
      <main class="page-shell page-generic">
        <section class="web-detail" data-web-detail>
          <!-- 分类：Project / RED -->
          <a class="web-detail__back" href="../project.html" aria-label="返回 Project 列表">
            <span class="web-detail__back-icon" aria-hidden="true"></span>
          </a>
          <div class="web-detail__top">
            <div class="web-detail__gallery">
              <!-- 顶部 banner 图片区域 -->
              <div class="web-detail__carousel" data-detail-carousel>
                <div class="web-detail__track">
                  <article class="web-detail__hero"><img src="../../assets/images/works/project/app-rhythm/1.png" alt="" /></article>
                </div>
              </div>
              <div class="web-detail__gallery-controls">
                <button class="web-detail__gallery-nav web-detail__gallery-nav--prev" type="button" aria-label="上一张">‹</button>
                <div class="web-detail__gallery-dots" data-detail-dots></div>
                <button class="web-detail__gallery-nav web-detail__gallery-nav--next" type="button" aria-label="下一张">›</button>
              </div>
              <section class="web-detail__screens" data-device-switcher>
                <div class="web-detail__device-tabs">
                  <button class="web-detail__device-tab is-active" type="button" data-device-tab="mobile">Mobile</button>
                  <!-- <button class="web-detail__device-tab" type="button" data-device-tab="pc">PC</button> -->
                </div>
                <div class="web-detail__event-tabs" data-event-tabs aria-label="Events"></div>
                <div class="web-detail__device-panels">
                  <!-- Mobile 图片区域 -->
                  <div class="web-detail__device-panel is-active" data-device-panel="mobile">
                    <div class="web-detail__event-panel is-active" data-event-panel="メイン画面">
                      <div class="web-detail__phone-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/app-rhythm/app-01.png" alt="" /></div></div></div>
                    </div>
                    <div class="web-detail__event-panel" data-event-panel="リズム設定">
                      <div class="web-detail__phone-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/app-rhythm/app-02.png"  alt="" /></div></div></div>
                    </div>
                    <div class="web-detail__event-panel" data-event-panel="設定">
                      <div class="web-detail__phone-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/app-rhythm/app-03.png" alt="" /></div></div></div>
                    </div>
                    
                  </div>
                  <!-- PC 图片区域 -->
                  <div class="web-detail__device-panel" data-device-panel="pc">
                    <div class="web-detail__event-panel is-active" data-event-panel="event-1">
                      <div class="web-detail__desktop-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/app-rhythm/app-03.png" alt="pc event 1" /></div></div></div>
                    </div>
                    <div class="web-detail__event-panel" data-event-panel="event-2">
                      <div class="web-detail__desktop-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/app-rhythm/app-03.png" alt="pc event 2" /></div></div></div>
                    </div>
                  </div>
                </div>
              </section>
            </div>
            <aside class="web-detail__info">
              <h1>メトロノーム&リズム検出APP</h1>
              <div class="web-detail__copy">
                <p>
                 メトロノーム＆リズム検出機能を備えた音楽練習アプリの制作事例。<br/>
                  本プロジェクトでは、UI/UXデザインに加え、プロダクト設計にも携わりました。<br/>
                  テンポ調整、拍子設定、リズム確認などの主要機能を直感的に操作できるよう、情報設計・画面遷移・機能導線を整理。
                  デザイン面では、演奏中でも視認しやすいコントラストや操作性を意識し、音楽ツールとしての先進性と使いやすさを両立した体験設計を目指しました。
                </p>
              </div>
              <div class="web-item__tools">
                <p>Tool</p>
                <div class="web-item__icons">
                  <img src="../../assets/images/toolicon/mark_photoshop.png" alt="Photoshop" />
                  <img src="../../assets/images/toolicon/mark_illustrator.png" alt="Illustrator" />
                   <img src="../../assets/images/toolicon/mark_figma.png" alt="Figma" />

                </div>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="../../assets/js/site-app.js"></script>
  </body>
</html>
