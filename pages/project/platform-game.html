<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海源観光サイト | Litailong Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../../assets/images/logo/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../assets/css/site.css" />


  </head>
  <body data-page="web-detail" data-root-path="../..">
    <div data-site-shell>
      <main class="page-shell page-generic">
        <section class="web-detail" data-web-detail>
          <!-- 分类：Web / KAGOME -->
          <a class="web-detail__back" href="../web.html" aria-label="返回 Web 列表">
            <span class="web-detail__back-icon" aria-hidden="true"></span>
          </a>
          <div class="web-detail__top">
            <div class="web-detail__gallery">
              <!-- 顶部 banner 图片区域 -->
              <div class="web-detail__carousel" data-detail-carousel>
                <div class="web-detail__track">
                  <article class="web-detail__hero"><img src="../../assets/images/works/project/platform-game/1.png" alt="" /></article>                
                </div>
              </div>
              <div class="web-detail__gallery-controls">
                <button class="web-detail__gallery-nav web-detail__gallery-nav--prev" type="button" aria-label="上一张">‹</button>
                <div class="web-detail__gallery-dots" data-detail-dots></div>
                <button class="web-detail__gallery-nav web-detail__gallery-nav--next" type="button" aria-label="下一张">›</button>
              </div>
              <section class="web-detail__screens" data-device-switcher>
                <div class="web-detail__device-tabs">
                  <button class="web-detail__device-tab is-active" type="button" data-device-tab="mobile">Mobile</button>
                  <button class="web-detail__device-tab" type="button" data-device-tab="pc">PC</button>
                </div>
                <div class="web-detail__event-tabs" data-event-tabs aria-label="Events"></div>
                <div class="web-detail__device-panels">
                  <!-- Mobile 图片区域 -->
                  <div class="web-detail__device-panel is-active" data-device-panel="mobile">
                    <div class="web-detail__event-panel is-active" data-event-panel="Home">
                      <div class="web-detail__phone-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/platform-game/home-m.png" alt="" /></div></div></div>
                    </div>
                    <div class="web-detail__event-panel" data-event-panel="SubPage">
                      <div class="web-detail__phone-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/platform-game/subpage-01-m.png" alt="" /></div></div></div>
                    </div>
                  </div>
                  <!-- PC 图片区域 -->
                  <div class="web-detail__device-panel" data-device-panel="pc">
                    <div class="web-detail__event-panel is-active" data-event-panel="Home">
                      <div class="web-detail__desktop-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/platform-game/home-pc.png" alt="" /></div></div></div>
                    </div>
                    <div class="web-detail__event-panel" data-event-panel="SubPage">
                      <div class="web-detail__desktop-mockup"><div class="web-detail__screen"><div class="web-detail__screen-scroll"><img src="../../assets/images/works/project/platform-game/subpage-01-pc.png" alt="" /></div></div></div>
                    </div>
                  </div>
                </div>
              </section>
            </div>
            <aside class="web-detail__info">
              <h1>ゲームアカウント売買売買プラットフォーム</h1>
              <div class="web-detail__copy">
                <p>
                  ゲームアカウント売買プラットフォームにおいて、UI/UXデザインを担当しました。<br>
                  画面制作に加えて、機能構成の整理、ユーザー導線の検討、情報設計の補助など、プロダクト設計面の支援にも関わりました。
                  取引サービスとして必要な信頼感や安全性を意識しながら、売り手・買い手双方にとって使いやすい体験を目指して設計を行いました。
                </p>
             
              </div>
              <div class="web-item__tools">
                <p>Tool</p>
                <div class="web-item__icons">
                  <img src="../../assets/images/toolicon/mark_photoshop.png" alt="Photoshop" />
                  <img src="../../assets/images/toolicon/mark_illustrator.png" alt="Illustrator" />
                   <img src="../../assets/images/toolicon/mark_figma.png" alt="Figma" />

                </div>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="../../assets/js/site-app.js"></script>
  </body>
</html>
